# Conductor fleet cycle runner — configuration.
#
# The roster is the closed set of models that may receive work (invariant 1:
# closed roster; fail closed, never default). `conductor roster drift` diffs
# this against ~/.claude/model-scorecard.md and warns, never auto-edits.
#
# Defaults are shown explicitly; every knob is overridable.

autonomy = "propose"

[scan]
# Fleet root. The scanner walks this for .beads/metadata.json.
root = "~/git"
# Config-driven exclusions (repo directory names). NOTE: chezmoi-config is
# ALSO hard-denied in code (config.rs HARDCODED_EXCLUDE), independent of this
# list — never scan/dispatch chezmoi-config (invariant 5).
exclude = []

[budgets]
# Ceilings, not targets (invariant 7). Hitting any budget stops the cycle.
max_dispatches_per_cycle = 8
max_active_per_repo = 1
# Combined cap for metered external backends (pi + agy + codex).
max_external_dispatches = 4
item_wall_clock_mins = 45
cycle_wall_clock_mins = 90

[verify]
# orchestra judge model — always passed explicitly (never trust the default).
judge = "opencode-go/qwen3.7-max"
# Force orchestra verification for every item, not just adversarial ones.
always_orchestra = false

[review]
# Tiered qualitative review after mechanical verify passes.
enabled = true
min_tier_gap = 1

[arena]
# Head-to-head Ralph arena defaults. Candidate runs are capped low and the
# scheduler will not run two profiles with the same provider_group together.
parallel = 2
auto_apply = true
min_score_x10 = 40
keep_worktrees = false

[[arena_profile]]
name = "pi-glm52"
harness = "pi"
model = "opencode-go/glm-5.2"
provider_group = "opencode-go"

