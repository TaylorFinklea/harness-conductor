# Conductor fleet cycle runner — static configuration.
#
# Execution profiles, providers, and invocation identities are owned by Bursar.
# Every launch consumes `bursar/roster@1`; Conductor pins its artifact path and
# SHA-256 in the approved cycle plan.

autonomy = "propose"

[scan]
# Fleet root. The scanner walks this for .beads/metadata.json.
root = "~/git"
# Config-driven exclusions (repo directory names). NOTE: both personal chezmoi
# transition names are hard-denied in code (config.rs HARDCODED_EXCLUDE),
# independent of this list — never scan/dispatch either (invariant 5).
exclude = []

# Per-repo data policy. `proprietary`/`internal` exclude profiles whose Bursar
# data policy permits training on submitted input. A repo absent from this table
# defaults to `proprietary` (fail closed).
[[repo_policy]]
repo = "bursar"
cost_policy = "oss"

[[repo_policy]]
repo = "conductor"
cost_policy = "oss"

[[repo_policy]]
repo = "envoy"
cost_policy = "oss"

[[repo_policy]]
repo = "foreman"
cost_policy = "oss"

[[repo_policy]]
repo = "gauntlet"
cost_policy = "oss"

[[repo_policy]]
repo = "guildhall"
cost_policy = "oss"

[[repo_policy]]
repo = "hindsight"
cost_policy = "oss"

[[repo_policy]]
repo = "provenance"
cost_policy = "oss"

[[repo_policy]]
repo = "simmersmith"
cost_policy = "oss"

[[repo_policy]]
repo = "tesela"
cost_policy = "oss"

[[repo_policy]]
repo = "warden"
cost_policy = "oss"

[budgets]
# Ceilings, not targets (invariant 7). Hitting any budget stops the cycle.
max_dispatches_per_cycle = 8
max_active_per_repo = 1
# Combined cap for metered external backends (pi + agy + codex).
max_external_dispatches = 4
# Minutes to defer a provider when a runtime HTTP 429 has no reset timestamp.
unknown_429_cooldown = 15
item_wall_clock_mins = 45
cycle_wall_clock_mins = 90

[verify]
# orchestra judge model — always passed explicitly (never trust the default).
judge = "opencode-go/qwen3.7-max"
# Force orchestra verification for every item, not just adversarial ones.
always_orchestra = false

[review]
# Tiered qualitative review after mechanical verify passes.
enabled = true
min_tier_gap = 1

[adversarial_review]
# N provider-distinct reviewers plus one additional Lead synthesis profile.
max_reviewers = 7
parallel = 3
judge = "openai-codex--codex--gpt-5.6-sol--max"
judge_fallbacks = ["openai-codex--codex--gpt-5.6-terra--xhigh", "anthropic--claude-code--claude-opus-4-8--none"]

[arena]
# Head-to-head defaults. Candidate profiles are resolved by Bursar.
parallel = 2
auto_apply = true
min_score_x10 = 40
keep_worktrees = false

# Retry order is Conductor job policy, not roster ownership. Each ID must be
# present in the Bursar snapshot; unavailable fallback profiles are omitted at
# launch so a disabled provider can never be selected at dispatch time.
[[job_fallback]]
profile_id = "anthropic--claude-code--claude-sonnet-5--none"
fallback_profile_ids = ["openai-codex--codex--gpt-5.6-terra--xhigh", "openai-codex--codex--gpt-5.6-sol--max"]

[[job_fallback]]
profile_id = "anthropic--claude-code--claude-opus-4-8--none"
fallback_profile_ids = ["openai-codex--codex--gpt-5.6-sol--max", "openai-codex--codex--gpt-5.6-terra--xhigh"]

[[job_fallback]]
profile_id = "opencode-go--pi--minimax-m3--none"
fallback_profile_ids = ["ollama-cloud--pi--minimax-m3--none", "neuralwatt--pi--glm-5.2-short--none", "neuralwatt--pi--glm-5.2--none", "openai-codex--codex--gpt-5.6-luna--high"]

[[job_fallback]]
profile_id = "opencode-go--pi--qwen3.7-max--none"
fallback_profile_ids = ["neuralwatt--pi--glm-5.2-short--none", "neuralwatt--pi--glm-5.2--none", "openai-codex--codex--gpt-5.6-luna--high"]

